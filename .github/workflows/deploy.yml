name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Frontend build ──
      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}
          VITE_USER_POOL_ID: ${{ vars.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ vars.VITE_USER_POOL_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
        run: npm run build

      # ── Lambda deps ──
      - name: Install Lambda deps
        working-directory: lambda
        run: npm ci

      # ── AWS credentials ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # ── Deploy frontend to S3 + invalidate CloudFront ──
      - name: Deploy frontend to S3
        run: aws s3 sync dist/ s3://${{ vars.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.DISTRIBUTION_ID }} --paths '/*'

      # ── Deploy Lambda code ──
      - name: Package and update HTTP API Lambda
        run: |
          cd lambda
          zip -r ../lambda.zip . -x "node_modules/.cache/*"
          cd ..
          aws lambda update-function-code \
            --function-name coloring-book-studio-api \
            --zip-file fileb://lambda.zip

      - name: Update WebSocket Lambda
        run: |
          aws lambda update-function-code \
            --function-name coloring-book-studio-ws \
            --zip-file fileb://lambda.zip

      - name: Update WS Authorizer Lambda
        run: |
          aws lambda update-function-code \
            --function-name coloring-book-studio-ws-auth \
            --zip-file fileb://lambda.zip
